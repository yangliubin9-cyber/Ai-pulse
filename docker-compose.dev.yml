# ai-pulse — 本地开发依赖（仅依赖服务，不含 app；00-Global/local-development.md §1）
# 用途：本地开发时起 postgres/redis 等裸依赖；前后端进程本地裸跑（uvicorn --reload / vite）
# 这不是交付物——交付用 docker-compose.yml。两者用途不同，勿混淆。

name: ai-pulse-dev

services:
  postgres:
    image: postgres:16.4
    environment:
      POSTGRES_USER: ai-pulse
      POSTGRES_PASSWORD: devpassword          # 仅本地开发弱密码，绝不进交付
      POSTGRES_DB: ai-pulse
      TZ: UTC
      PGTZ: UTC
    ports:
      - "17012:5432"
    volumes:
      - ai-pulse_dev_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai-pulse"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.4
    command: ["redis-server", "--requirepass", "devpassword", "--appendonly", "yes"]
    ports:
      - "17013:6379"
    volumes:
      - ai-pulse_dev_redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a devpassword ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5

  # TODO(bootstrap): 启用 object-storage/vector-db/message-queue 分类时按需补 minio/qdrant/rabbitmq 等依赖

volumes:
  ai-pulse_dev_postgres:
  ai-pulse_dev_redis:
