<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI Pulse — 克制、信息密度高的 AI 资讯聚合精选" />
    <title>AI Pulse</title>
    <script>
      // Anti-FOUC: apply persisted theme before first paint.
      (function () {
        try {
          var raw = localStorage.getItem('ai-pulse-theme');
          var mode = 'system';
          if (raw) {
            var parsed = JSON.parse(raw);
            mode = (parsed && parsed.state && parsed.state.mode) || 'system';
          }
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved = mode === 'system' ? (prefersDark ? 'dark' : 'light') : mode;
          document.documentElement.setAttribute('data-theme', resolved);
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
