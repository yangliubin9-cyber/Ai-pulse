# ai-pulse — 交付模式 1（铁律三）
# 硬性：镜像 tag 禁 latest；长跑容器必配 healthcheck；启动顺序 depends_on.condition，禁 sleep
# 具名卷命名：ai-pulse_<service>_data

name: ai-pulse

services:
  backend:
    image: ${IMAGE_REGISTRY}/ai-pulse-backend:${IMAGE_TAG:?必须显式指定镜像 tag}
    env_file: .env
    environment:
      TZ: ${TZ:-UTC}
      # compose 网络内连接覆盖（.env 中端口是宿主机映射端口，容器内用服务名+容器端口）
      BACKEND_PORT: "8000"
      DB_HOST: postgres
      DB_PORT: "5432"
      CACHE_HOST: redis
      CACHE_PORT: "6379"
      OBJECT_STORAGE_LOCAL_PATH: /data/storage
      # LLM 内容增强（可选；默认关，留空即走离线翻译）。值取自 .env，这里显式透传以便审计。
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai-compatible}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-2048}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.3}
      LLM_CONCURRENCY: ${LLM_CONCURRENCY:-2}
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ai-pulse_storage_data:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # 不依赖镜像内置 curl（python slim 普遍不带）；探针端点见可观测性基线 §1
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz/live', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    stop_grace_period: 30s
    restart: unless-stopped
    networks: [app]

  frontend:
    image: ${IMAGE_REGISTRY}/ai-pulse-frontend:${IMAGE_TAG:?必须显式指定镜像 tag}
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # wget 由 busybox 提供：frontend 镜像基底必须用 nginx:alpine（debian 版 nginx 无 wget/curl）
      # 用 127.0.0.1 + /healthz：Alpine 下 localhost 先解析 ::1，nginx 须 IPv4/IPv6 双监听才稳
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks: [app]

  # ── 默认演示 provider（按项目启用分类增删；全部 provider 片段见 services/<分类>/） ──
  postgres:
    image: postgres:16.4
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: ${TZ:-UTC}
      PGTZ: ${TZ:-UTC}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ai-pulse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [app]

  redis:
    image: redis:7.4
    command: ["redis-server", "--requirepass", "${CACHE_PASSWORD}", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "${CACHE_PORT}:6379"
    volumes:
      - ai-pulse_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${CACHE_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [app]

networks:
  app:
    name: ai-pulse_app

volumes:
  ai-pulse_postgres_data:
  ai-pulse_redis_data:
  ai-pulse_storage_data:
